{% extends 'base.html' %}

{% block title %}Confirmar Exclusão - Olimpíadas Universitárias{% endblock %}

{% block content %}
<div class="max-w-sm mx-auto pt-8">
    <div class="bg-white border border-slate-200/60 rounded-3xl p-6 sm:p-8 text-center shadow-sm">
        <div class="inline-flex items-center justify-center w-12 h-12 rounded-2xl bg-red-50 text-red-600 border border-red-100 mb-5">
            <i class="fas fa-exclamation-triangle text-lg"></i>
        </div>
        <h1 class="text-base font-bold text-slate-800 mb-2">Confirmar Exclusão</h1>
        <p class="text-xs text-slate-450 mb-6 leading-relaxed">
            Tem certeza de que deseja excluir <strong class="text-slate-700 font-semibold">{{ object }}</strong>? Esta ação é definitiva e não poderá ser desfeita.
        </p>
        
        <form method="post">
            {% csrf_token %}
            <div class="flex flex-col gap-2.5 text-xs">
                <button type="submit" class="w-full inline-flex items-center justify-center px-4 py-2.5 rounded-xl text-white bg-red-600 hover:bg-red-700 font-bold transition shadow-sm active:scale-[0.98]">
                    Sim, Excluir permanentemente
                </button>
                <a href="{{ request.META.HTTP_REFERER|default:'dashboard' }}" class="w-full inline-flex items-center justify-center px-4 py-2.5 border border-slate-200 rounded-xl font-semibold text-slate-500 bg-white hover:bg-slate-50 transition active:scale-[0.98]">
                    Cancelar e Voltar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
