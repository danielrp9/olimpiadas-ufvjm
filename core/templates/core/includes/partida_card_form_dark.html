<form action="{% url 'chaveamento_partida_resultado' pk=partida.pk %}" method="POST" class="bg-white/10 backdrop-blur-sm p-3 rounded-2xl border border-white/20 flex items-center justify-between gap-3 text-xs text-white">
    {% csrf_token %}
    <div class="flex-1 font-semibold text-white text-right truncate">
        {% if partida.time_a %}
            {{ partida.time_a.nome_delegacao|default:partida.time_a.email }}
        {% else %}
            <span class="text-slate-300 font-normal italic">A definir</span>
        {% endif %}
    </div>

    <div class="flex items-center gap-1.5 bg-slate-900/80 px-2 py-1 rounded-xl border border-white/30 flex-shrink-0">
        <input type="number" min="0" name="placar_a" value="{{ partida.placar_a|default_if_none:'' }}" placeholder="0" class="w-8 text-center font-bold text-white border-0 p-0 focus:ring-0 bg-transparent">
        <span class="text-slate-400 font-bold">x</span>
        <input type="number" min="0" name="placar_b" value="{{ partida.placar_b|default_if_none:'' }}" placeholder="0" class="w-8 text-center font-bold text-white border-0 p-0 focus:ring-0 bg-transparent">
    </div>

    <div class="flex-1 font-semibold text-white text-left truncate">
        {% if partida.time_b %}
            {{ partida.time_b.nome_delegacao|default:partida.time_b.email }}
        {% else %}
            <span class="text-slate-300 font-normal italic">A definir</span>
        {% endif %}
    </div>

    <button type="submit" class="p-1.5 text-amber-300 hover:text-amber-100 hover:bg-white/10 rounded-lg transition flex-shrink-0" title="Salvar Resultado">
        <i class="fas fa-save"></i>
    </button>
</form>
